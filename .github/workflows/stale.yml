name: Close stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-message: 'This issue has been inactive for 60 days and is marked as stale. It will be closed in 7 days if there is no further activity.'
          close-issue-message: 'This issue was closed because it remained stale for 7 days with no further activity.'
          stale-pr-message: 'This pull request has been inactive for 60 days and is marked as stale. It will be closed in 7 days if there is no further activity.'
          close-pr-message: 'This pull request was closed because it remained stale for 7 days with no further activity.'
